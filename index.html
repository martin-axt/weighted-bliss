<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weighted Bliss | Todo List</title>
    <meta name="description" content="A mindful todo list that prioritizes tasks by urgency, mood, and time.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="app">
        <header>
            <h1>Weighted Bliss</h1>
            <p class="subtitle">Prioritize your life, softly.</p>
        </header>

        <main>
            <section class="task-input-card">
                <form id="todo-form">
                    <div class="input-group">
                        <input type="text" id="task-name" placeholder="What needs doing?" required autocomplete="off">
                    </div>

                    <div class="sliders-container">
                        <div class="slider-item">
                            <label for="urgency">Urgency <span class="val" id="val-urgency">3</span></label>
                            <span class="range-labels"><span>Low</span><span>High</span></span>
                            <input type="range" id="urgency" min="1" max="5" value="3" step="1">
                        </div>

                        <div class="slider-item">
                            <label for="mood">Mood <span class="val" id="val-mood">3</span></label>
                            <span class="range-labels"><span>Boring</span><span>Exciting</span></span>
                            <input type="range" id="mood" min="1" max="5" value="3" step="1">
                        </div>

                        <div class="slider-item">
                            <label for="time">Time <span class="val" id="val-time">3</span></label>
                            <span class="range-labels"><span>Long</span><span>Short</span></span>
                            <input type="range" id="time" min="1" max="5" value="3" step="1">
                        </div>
                    </div>

                    <button type="submit" id="add-btn">Add Task</button>
                </form>
            </section>

            <section class="progress-section">
                <div class="progress-header">
                    <span>Daily Progress</span>
                    <span id="progress-text">0 / 25</span>
                </div>
                <div class="progress-bar-bg">
                    <div id="progress-bar-fill" class="progress-bar-fill"></div>
                </div>
            </section>

            <section class="weekly-calendar-card">
                <div class="weekly-header">
                    <button id="prev-week" class="nav-btn">&lt;</button>
                    <span id="calendar-month-year">January 2026</span>
                    <button id="next-week" class="nav-btn">&gt;</button>
                </div>
                <div id="calendar-days" class="weekly-grid">
                    <!-- Week days injected here -->
                </div>
            </section>

            <section class="stats-card">
                <h2 class="section-title">Statistics</h2>
                <div class="stats-grid" id="stats-container">
                    <div class="stat-item">
                        <span class="stat-label">This Week</span>
                        <span class="stat-value" id="stat-week">0%</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">This Month</span>
                        <span class="stat-value" id="stat-month">0%</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">This Year</span>
                        <span class="stat-value" id="stat-year">0%</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Avg. Points</span>
                        <span class="stat-value" id="stat-avg">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Total Points</span>
                        <span class="stat-value" id="stat-total">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Best Streak</span>
                        <span class="stat-value" id="stat-streak">0</span>
                    </div>
                </div>
            </section>

            <section class="list-controls">
                <div class="sort-info">
                    Sorted by weight sum (Descending)
                </div>
            </section>

            <ul id="todo-list" class="task-list">
                <!-- Tasks will be injected here -->
            </ul>
        </main>

        <footer>
            <p>Total Weight = Urgency + Mood + Time</p>
        </footer>
    </div>
    <script type="module" src="main.js"></script>
</body>

</html>
